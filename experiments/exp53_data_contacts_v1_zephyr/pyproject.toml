[project]
name = "exp53-data-contacts-v1-zephyr"
version = "0.1.0"
description = "Generate the contacts-v1 training-document dataset at scale on the marin Iris cluster via Zephyr, from the afdb-24M manifest. Calls into marinfold's contacts_v1 generator (no re-implementation)."
requires-python = ">=3.11,<3.13"
# Base install covers Stage A (selection), the per-row generation logic, and
# the marin-zephyr runtime used to fan out Stage B on Iris. marin-zephyr is in
# base (not an extra) so Iris workers get the runtime however the job ships its
# env (matches exp5).
dependencies = [
    "marinfold[contacts-v1]",  # contacts_v1.generate_document + pyconfind
    "pyconfind[fast]",         # numba JIT contact backend for the at-scale run
    "gemmi>=0.6",              # parse mmCIF bytes -> gemmi.Structure
    "numpy",
    "pyarrow",                 # parquet read/write + Zephyr-native row dicts
    "duckdb",                  # Stage A: cluster groupby + pLDDT window in SQL
    "fsspec",                  # uniform local + cloud IO for per-row cif fetch
    "gcsfs",                   # gs:// for the AFDB public bucket + marin output
    "huggingface_hub",         # hf:// for the timodonnell/afdb-24M manifest
    "marin-zephyr",            # Stage B: distributed generation on marin Iris
    # Pin httpx < 1: prerelease=allow (needed for some marin deps) otherwise
    # floats httpx to 1.0.dev*, whose Client() dropped the `timeout` kwarg that
    # marin-iris's GCP provider passes -> iris CLI crashes on submit.
    "httpx>=0.28.1,<1",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[dependency-groups]
dev = []

[tool.uv]
package = false
fork-strategy = "fewest"
prerelease = "allow"
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
]

[tool.uv.sources]
# Git deps (not local path) so the SAME pyproject resolves on remote Iris
# workers, matching exp5. contacts_v1 is merged on main, so git@main is the
# code under test here. marin-zephyr pinned to the ref exp5 ran on the
# cluster with; revisit against the live cluster at the iris-smoke step.
marinfold = { git = "https://github.com/Open-Athena/MarinFold.git", subdirectory = "marinfold" }
marin-zephyr = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/zephyr", branch = "alxmrs/stamp-iris-build-date" }

[tool.pytest.ini_options]
markers = [
    "network: tests that require internet (HF / GCS reads). Skip with `pytest -m 'not network'`.",
]
