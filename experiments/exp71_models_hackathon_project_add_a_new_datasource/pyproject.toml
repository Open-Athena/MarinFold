[project]
name = "exp71-models-hackathon-project-add-a-new-datasource"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    # marin-core[tpu] only on linux (Iris workers); plain marin-core on mac for
    # local dev. Env markers in base deps install automatically under Iris's
    # `uv sync --all-packages` -- an optional `tpu` extra would NOT, since that
    # sync passes no `--all-extras`/`--extra tpu`.
    "marin-core>=0.2.12.dev202606100934 ; sys_platform != 'linux'",
    "marin-core[tpu]>=0.2.12.dev202606100934 ; sys_platform == 'linux'",
    "marin-fray>=0.2.12.dev202606100934",
    "marin-iris>=0.2.12.dev202606100934",
    "marin-levanter>=0.2.12.dev202606100934",
]

[dependency-groups]
# Iris's remote worker runs `uv sync --all-packages --no-group dev`, so a
# dev group must exist (even if empty) for --no-group to resolve.
dev = []

[tool.uv]
# Resolve the lock only for the platforms we actually use (mac local dev +
# linux Iris workers), matching the sibling experiments.
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
]
