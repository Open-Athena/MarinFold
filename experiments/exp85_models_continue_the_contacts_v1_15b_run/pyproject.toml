[project]
name = "exp85-models-continue-contacts-v1-1-5b"
version = "0.1.0"
description = "Warm-restart the #67 contacts-v1 1.5B run for ~1 more epoch with a re-heated LR — issue #85."
requires-python = ">=3.11,<3.13"
dependencies = [
    # marin-core is the source dist for the `marin` module (see [tool.uv.sources]
    # below — the marin workspace is pinned to a git source >= 2026-06-02 so the
    # worker gets the fixed cache-ledger reader; the published `marin` wheel is
    # frozen at the buggy 2026-05-29 build).
    "marin-core",
    "marin-levanter",
    "marin-iris",
    "marin-zephyr",
    "marin-rigging",
    "marinfold-models",
    # marin.processing.tokenize -> marin.datakit.normalize imports `dupekit`
    # unconditionally. The source dist name is `marin-dupekit` (git-sourced below).
    "marin-dupekit",
    # protein_distogram_eval.py:
    "fsspec",
    "matplotlib",
    "numpy",
    "pyarrow",
    "transformers",
    "tokenizers",
]

[project.optional-dependencies]
tpu = ["marin-core[tpu]; sys_platform == 'linux'"]
# The marin executor builds the CPU-only tokenize sub-job with `--extra cpu`
# (default_tokenize -> remote(..., pip_dependency_groups=["cpu"])), so this
# extra must exist in the experiment's pyproject. exp0 never needed it because
# it pins override_output_path to a pre-existing token cache (tokenize skipped);
# exp67 tokenizes a fresh corpus, so the step actually runs. `marin[cpu]` pulls
# the CPU jax build used for tokenization; it also hard-requires torch /
# torchvision (unused at runtime — tokenize sets USE_TORCH=0 — but they must
# resolve). torch/torchvision are inlined here (NOT just left transitive)
# because uv source maps don't propagate through transitive extras, so the
# `pytorch-cpu` index routing below only applies to direct deps. Mirrors the
# exp26 foldbench pattern.
cpu = [
    "marin-core[cpu]",
    "torch==2.10.0",
    "torchvision==0.25.0+cpu; sys_platform == 'linux' and platform_machine == 'x86_64'",
]

[dependency-groups]
dev = []

[tool.uv]
# This pyproject only exists so `uv sync` can resolve the venv — the
# experiment itself is a collection of scripts, not a packaged library.
package = false
fork-strategy = "fewest"
prerelease = "allow"
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
]
override-dependencies = [
    "omegaconf>=2.4.0.dev4",
    "antlr4-python3-runtime==4.11",
    "python-multipart>=0.0.22",
    "wheel>=0.46.2",
    "datasets>=3.1.0,<4.0.0",
    "equinox>=0.11.10",
]

# The marin-* packages + dupekit are pinned to a marin git source (see
# [tool.uv.sources] below) so the worker builds the FIXED cache-ledger reader
# from source (>= 2026-06-02), not the frozen 2026-05-29 wheels. Only kitoken
# (a Rust wheel from a separate repo) is still fetched as a prebuilt wheel.
find-links = [
    "https://github.com/marin-community/kitoken/releases/expanded_assets/kitoken-0.10.2-a3012f4",
]

[[tool.uv.index]]
name = "marin-resiliparse"
url = "https://marin-community.github.io/chatnoir-resiliparse/simple"

# pytorch-cpu is where the `+cpu` local-version wheels live (torch and
# torchvision), required by marin's `cpu` extra. `explicit = true` so it's
# only consulted for packages routed to it below. Mirrors exp26.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
resiliparse = { index = "marin-resiliparse" }
# Route torch / torchvision through pytorch-cpu for the `cpu` extra so the
# `+cpu` local-version wheels resolve.
torch = [{ index = "pytorch-cpu", extra = "cpu" }]
torchvision = [{ index = "pytorch-cpu", extra = "cpu" }]
# Resolve marinfold-models from git (the `models/` subdirectory), NOT a local
# `path = "../../models"`. Iris bundles only this experiment dir (`git ls-files`
# from cwd), so a relative path that escapes the dir fails on the worker with
# "cannot normalize a relative path beyond the base directory: /app/../../models".
# A git source is fetched on the worker, exactly like exp53's `marinfold` dep.
# Pinned to the exact commit used to launch the recorded run because it carries
# the marin-API-drift fix in defaults.py (see README "Implementation notes").
# For local iteration, override with
#   uv sync --extra tpu  (after `uv pip install --reinstall-package marinfold-models ../../models`)
marinfold-models = { git = "https://github.com/Open-Athena/MarinFold.git", subdirectory = "models", rev = "445e8b39c9441af304959dea457d0ba95635ee3a" }

# Pin the whole marin workspace to a git source at commit e78c54a8 (2026-06-10),
# which carries the #6008/#6014 cache-ledger READER fix (accepts the `input_ids`
# ledger that exp67's reused cache was written with). The published `marin-*`
# wheels are frozen at the buggy 2026-05-29 build, and a git source can't
# substitute for the published `marin` (it renames `marin-core` -> `marin` at
# release), so we depend on the source dist names directly. The worker fetches
# the marin repo and builds these from source (this is how eric's #75 sweep gets
# a working reader). NOTE: the iris CLIENT still needs an editable iris for the
# freshness gate (`uv pip install -e ~/git/marin/lib/iris` after sync) — the
# git-source iris here is for the (freshness-exempt) worker.
marin-core = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/marin", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-levanter = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/levanter", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-iris = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/iris", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-zephyr = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/zephyr", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-rigging = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/rigging", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-fray = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/fray", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-finelog = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/finelog", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-haliax = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/haliax", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
marin-dupekit = { git = "https://github.com/marin-community/marin.git", subdirectory = "lib/dupekit", rev = "e78c54a83236e532ac893e1d92cfde8b72cf6bb2" }
